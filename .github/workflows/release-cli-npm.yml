name: Release CLI npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read

jobs:
  preflight:
    name: Validate package metadata
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check release package metadata and npm availability
        run: node scripts/validate-cli-npm-release.js --check-registry --allow-existing

  build-native:
    name: Build ${{ matrix.package }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package: switch-darwin-arm64
          - os: macos-15-intel
            package: switch-darwin-x64
          - os: ubuntu-24.04
            package: switch-linux-x64
            rust_target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            package: switch-linux-arm64
            rust_target: aarch64-unknown-linux-musl
          - os: windows-2022
            package: switch-win32-x64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable

      # Build Linux artifacts against musl instead of the runner's GLIBC.
      # This lets the npm CLI run on older supported distributions and removes
      # the need for a system libssl/libcrypto package.
      - name: Install static Linux build toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
          rustup target add ${{ matrix.rust_target }}

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node -e "if (!process.env.NODE_AUTH_TOKEN) { console.error('NPM_TOKEN secret is missing or empty'); process.exit(1); } console.log('NPM_TOKEN secret is configured')"

      - name: Verify npm token can authenticate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Check native package availability
        id: native-package
        working-directory: packages/${{ matrix.package }}
        run: node ../../scripts/check-npm-package-exists.js

      - name: Build CLI
        if: steps.native-package.outputs.exists != 'true'
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin matpool --no-default-features --profile cli-release ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }}

      - name: Stage native binary
        if: steps.native-package.outputs.exists != 'true'
        run: node scripts/stage-npm-binary.js ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }}

      - name: Verify Linux CLI is distribution-independent
        if: steps.native-package.outputs.exists != 'true' && runner.os == 'Linux'
        run: scripts/verify-linux-cli-binary.sh packages/${{ matrix.package }}/bin/matpool

      - name: Publish native package
        if: steps.native-package.outputs.exists != 'true'
        working-directory: packages/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node ../../scripts/publish-npm-package-if-needed.js

  publish-main:
    name: Publish @mtswitch/switch
    runs-on: ubuntu-24.04
    needs: build-native

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node -e "if (!process.env.NODE_AUTH_TOKEN) { console.error('NPM_TOKEN secret is missing or empty'); process.exit(1); } console.log('NPM_TOKEN secret is configured')"

      - name: Verify npm token can authenticate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Publish main package
        working-directory: packages/switch
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node ../../scripts/publish-npm-package-if-needed.js
